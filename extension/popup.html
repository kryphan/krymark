<!doctype html>
<meta charset="utf-8" />
<body style="font-family:system-ui;background:#0d0d0f;color:#f2f2f3;margin:0;padding:16px;width:320px">
  <p style="font-family:monospace;color:#ff5a3c;font-size:10px;letter-spacing:.15em;margin:0 0 12px">◉ KRYMARK</p>

  <!-- STEP 0: chọn instance (1 lần) -->
  <div id="need-instance" style="display:none">
    <label style="display:block;font-size:11.5px;color:#8f8f96;margin:0 0 5px">Your KryMark instance</label>
    <div style="display:flex;gap:8px">
      <input id="instance" placeholder="https://krymark.dang.pm" style="flex:1;min-width:0;padding:9px 11px;background:#1b1b1e;border:1px solid #2c2c31;border-radius:8px;color:#f2f2f3;font-size:12.5px" />
      <button id="save-instance" style="padding:9px 14px;background:#ff3d2e;border:0;border-radius:8px;color:#fff;font-weight:600;font-size:12.5px;cursor:pointer">Go</button>
    </div>
    <p style="font-size:11px;color:#6a6a72;margin:8px 0 0">One-time. You just need to be logged into it in this browser — no API key.</p>
  </div>

  <!-- STEP 1: chưa đăng nhập -->
  <div id="need-login" style="display:none">
    <p style="font-size:13px;color:#f2f2f3;margin:0 0 8px">Log into <b id="inst-label"></b> in this browser, then reopen.</p>
    <button id="open-login" style="width:100%;padding:9px;background:#ff3d2e;border:0;border-radius:8px;color:#fff;font-weight:600;font-size:12.5px;cursor:pointer">Open instance</button>
    <p style="font-size:11px"><a id="change-inst" href="#" style="color:#6a6a72">Change instance</a></p>
  </div>

  <!-- STEP 2: đã đăng nhập → tạo / chọn -->
  <div id="ready" style="display:none">
    <label style="display:block;font-size:11.5px;color:#8f8f96;margin:0 0 5px">＋ New project — create &amp; start reviewing</label>
    <div style="display:flex;gap:8px">
      <input id="pname" placeholder="Project name" style="flex:1;min-width:0;padding:8px 10px;background:#1b1b1e;border:1px solid #2c2c31;border-radius:8px;color:#f2f2f3;font-size:12.5px" />
      <button id="create" style="padding:8px 14px;background:#ff3d2e;border:0;border-radius:8px;color:#fff;font-weight:600;font-size:12.5px;cursor:pointer;white-space:nowrap">Create + review</button>
    </div>

    <div id="proj-wrap" style="display:none;margin-top:14px;border-top:1px solid #232326;padding-top:10px">
      <p style="font-size:11px;color:#8f8f96;margin:0 0 6px">Your projects — click to review this page</p>
      <div id="projects"></div>
    </div>
    <p id="inst-foot" style="font-size:10.5px;color:#6a6a72;margin:12px 0 0"></p>
  </div>

  <p id="err" style="color:#ff5a3c;font-size:12px;margin:8px 0 0;display:none"></p>
  <script src="popup.js"></script>
</body>
