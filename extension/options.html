<!doctype html>
<meta charset="utf-8" />
<title>KryMark — settings</title>
<body style="font-family:system-ui;background:#0d0d0f;color:#f2f2f3;margin:0;padding:28px;min-width:420px">
  <p style="font-family:monospace;color:#ff5a3c;font-size:11px;letter-spacing:.15em;margin:0 0 10px">◉ KRYMARK</p>
  <h2 style="margin:0 0 16px;font-size:18px">Connect your instance</h2>
  <label style="display:block;font-size:12.5px;color:#8f8f96;margin:12px 0 5px">Instance URL</label>
  <input id="origin" placeholder="https://krymark.dang.pm" style="width:100%;box-sizing:border-box;padding:9px 11px;background:#1b1b1e;border:1px solid #2c2c31;border-radius:8px;color:#f2f2f3;font-size:13.5px" />
  <label style="display:block;font-size:12.5px;color:#8f8f96;margin:12px 0 5px">API key (Dashboard → Team → AI access)</label>
  <input id="key" placeholder="km_live_…" style="width:100%;box-sizing:border-box;padding:9px 11px;background:#1b1b1e;border:1px solid #2c2c31;border-radius:8px;color:#f2f2f3;font-size:13.5px;font-family:monospace" />
  <button id="save" style="margin-top:16px;padding:9px 18px;background:#ff3d2e;border:0;border-radius:8px;color:#fff;font-weight:600;font-size:13px;cursor:pointer">Save</button>
  <span id="msg" style="margin-left:10px;font-size:12.5px;color:#4ade80"></span>
  <script src="options.js"></script>
</body>
